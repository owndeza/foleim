<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Confirm — Velvet</title>
<style>
:root{
  --bg:#0f0f0f; --card:#1a1a1a; --muted:#cccccc; --accent:#ffffff; --accent-text:#0f0f0f; --glass: rgba(255,255,255,0.08);
  --radius:14px; --shadow: 0 6px 30px rgba(0,0,0,0.6);
  color-scheme: dark;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:#ffffff;font-size:16px;line-height:1.5}
a{color:inherit;text-decoration:none}
main{padding:32px;max-width:600px;margin:0 auto}
h1{text-align:center;font-size:28px;margin-bottom:24px}
form{background:var(--card);padding:24px;border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:16px}
input{padding:12px;border-radius:10px;border:0;background:var(--glass);color:#fff;font-size:16px;outline:none}
input::placeholder{color:var(--muted)}
button{padding:12px 16px;border-radius:12px;border:0;background:var(--accent);color:var(--accent-text);font-weight:600;font-size:16px;cursor:pointer;transition:all .2s ease}
button:hover{background:#e0e0e0; color:#0f0f0f}
.products-summary{margin-top:24px;background:var(--card);padding:16px;border-radius:var(--radius);box-shadow:var(--shadow)}
.products-summary h2{font-size:20px;margin-bottom:12px}
.products-summary ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}
.products-summary li{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(255,255,255,0.05);border-radius:8px}
.total{margin-top:12px;font-weight:700;font-size:18px;text-align:right}
@media(max-width:480px){main{padding:16px}}
</style>
</head>
<body>
<main>
  <h1>Оформление заказа</h1>
  
  <div class="products-summary" id="productsSummary">
    <h2>Ваши товары</h2>
    <ul id="productList"></ul>
    <div class="total" id="totalPrice"></div>
  </div>
  
  <form id="orderForm">
    <input type="text" id="username" placeholder="Telegram @username (обязательно)" required>
    <input type="text" id="phone" placeholder="Телефон (необязательно)">
    <button type="submit">Отправить заказ</button>
  </form>
</main>

<script>
const products = JSON.parse(localStorage.getItem('products')||'[]');
const cart = JSON.parse(localStorage.getItem('cart')||'[]');
const BOT_TOKEN = '8378463687:AAGLQ220tln7QHmZ24GY1krawglKV67sD-0';
const CHAT_ID = '927075325';

// показать список товаров в заказе
const productList = document.getElementById('productList');
const totalPriceEl = document.getElementById('totalPrice');
let total = 0;

cart.forEach(id=>{
  const p = products.find(x=>x.id===id);
  if(p){
    const li = document.createElement('li');
    li.textContent = p.title;
    const span = document.createElement('span');
    span.textContent = p.price+'$';
    li.appendChild(span);
    productList.appendChild(li);
    total += p.price;
  }
});
totalPriceEl.textContent = 'Итого: '+total+'$';

document.getElementById('orderForm').onsubmit = async e=>{
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const phone = document.getElementById('phone').value.trim();
  if(!username){ alert('Укажите Telegram username'); return; }

  let message = `Новый заказ:\nTelegram: ${username}\nТелефон: ${phone||'-'}\nТовары:\n`;
  cart.forEach(id=>{
    const p = products.find(x=>x.id===id);
    if(p) message += `- ${p.title} — ${p.price}$\n`;
  });
  message += `Итого: ${total}$`;

  try{
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({chat_id: CHAT_ID, text: message})
    });
    alert('Заказ отправлен!');
    localStorage.removeItem('cart');
    window.location.href = 'catalog.html';
  }catch(err){ alert('Ошибка отправки'); console.error(err); }
};
</script>
</body>

</html>
