<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прости меня ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:linear-gradient(to bottom,#ffb6d9,#ffd6eb);
    height:100vh;
    font-family:Arial,sans-serif;
    cursor:pointer;
}

.falling{
    position:absolute;
    top:-100px;
    color:#ff1493;
    font-weight:bold;
    user-select:none;
    pointer-events:none;
    animation:fall linear forwards;
    text-shadow:0 0 10px rgba(255,20,147,.5);
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
        opacity:1;
    }
    to{
        transform:translateY(calc(100vh + 150px)) rotate(360deg);
        opacity:.8;
    }
}

.burst{
    position:absolute;
    color:#ff1493;
    font-weight:bold;
    pointer-events:none;
    animation:explode 2s ease-out forwards;
    text-shadow:0 0 10px rgba(255,20,147,.5);
}

@keyframes explode{
    0%{
        transform:translate(0,0) scale(1);
        opacity:1;
    }
    100%{
        transform:translate(var(--x), var(--y)) scale(1.5);
        opacity:0;
    }
}

.center-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:48px;
    font-weight:bold;
    text-shadow:0 0 20px #ff1493;
    z-index:10;
    text-align:center;
}
</style>
</head>
<body>

<div class="center-text">
    прости меня киса
</div>

<script>
function createFalling() {
    const el = document.createElement("div");
    el.className = "falling";

    el.textContent = Math.random() > 0.5 ? "❤️" : "прости меня";

    el.style.left = Math.random() * window.innerWidth + "px";
    el.style.fontSize = (20 + Math.random() * 25) + "px";

    const duration = 4 + Math.random() * 6;
    el.style.animationDuration = duration + "s";

    document.body.appendChild(el);

    setTimeout(() => {
        el.remove();
    }, duration * 1000);
}

setInterval(createFalling, 150);

document.addEventListener("click", e => {
    for(let i = 0; i < 60; i++) {
        const el = document.createElement("div");
        el.className = "burst";

        el.textContent = Math.random() > 0.5 ? "❤️" : "прости меня";

        el.style.left = e.clientX + "px";
        el.style.top = e.clientY + "px";

        const angle = Math.random() * Math.PI * 2;
        const distance = 100 + Math.random() * 300;

        const x = Math.cos(angle) * distance + "px";
        const y = Math.sin(angle) * distance + "px";

        el.style.setProperty("--x", x);
        el.style.setProperty("--y", y);

        el.style.fontSize = (18 + Math.random() * 20) + "px";

        document.body.appendChild(el);

        setTimeout(() => {
            el.remove();
        }, 2000);
    }
});
</script>

</body>
</html>
